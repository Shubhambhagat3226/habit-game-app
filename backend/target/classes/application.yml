spring:
  application:
    name: habit-game-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/habitgame
    username: postgres
    password: 3226 # USER: Please update this to your PostgreSQL password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
